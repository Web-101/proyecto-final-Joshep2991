<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asientos</title>

<link rel="stylesheet" href="Proyect.css">

<style>

body{

    background:#000000;
    color:#ffffff;
    font-family:Arial;
    margin:0;
    padding:25px;

}

header{

    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;

}

header a{

    color:#00ffff;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;

}

#pantalla{

    width:520px;
    margin:auto;
    text-align:center;

    background:#00ffff;
    color:#000000;

    padding:12px;

    border-radius:6px;

    margin-bottom:35px;

    font-weight:bold;

    letter-spacing:4px;

    box-shadow:0 4px 12px rgba(0,255,255,.3);

}

#sala{

    width:520px;

    margin:auto;

    display:grid;

    grid-template-columns:repeat(8,55px);

    justify-content:center;

    gap:12px;

}

.asiento{

    width:55px;

    height:55px;

    border:none;

    border-radius:10px;

    font-weight:bold;

    font-size:14px;

    cursor:pointer;

    transition:.25s;

    color:#000000;

}

.asiento:hover{

    transform:scale(1.08);

}

.disponible{

    background:#eeeeee; 

}

.disponible:hover{

    background:#cccccc;

}

.ocupado{

    background:#8b0000; 
    color:#ffffff;

    cursor:not-allowed;

}

.seleccionado{

    background:#00ffff;

}

#asientosSeleccionados{

    margin-top:35px;

    text-align:center;
    color:#ffffff;

}

#total{

    text-align:center;
    color:#ff0000; 

}

#continuar{

    display:block;

    width:260px;

    margin:25px auto;

    padding:14px;

    border:none;

    border-radius:8px;

    background:#00ffff; 

    color:#000000; 

    font-size:17px;
    font-weight:bold;

    cursor:pointer;

}

#continuar:hover{

    background:#00cccc;

}

</style>

</head>

<body>

<header>

<a id="volver" href="#">Volver</a>

<h2>Sala</h2>

</header>

<div id="pantalla">

PANTALLA

</div>

<div id="sala">

</div>

<h3 id="asientosSeleccionados">

Asientos: Ninguno

</h3>

<h3 id="total">

Total: 0 Bs

</h3>

<button id="continuar">

Continuar

</button>

<script src="js/asientos.js"></script>

</body>

</html>
