<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra</title>
    <link rel="stylesheet" href="Proyect.css">
    <style>
        body{ background:#111; color:white; font-family:Arial; margin:0; padding:20px; }
        .contenedor{ max-width:400px; margin:auto; }
        input{ width:100%; padding:10px; margin-bottom:12px; box-sizing:border-box; background:#222; color:white; border:1px solid #444; border-radius:4px; }
        button{ width:100%; padding:12px; background:#d91c1c; color:white; border:none; cursor:pointer; border-radius:4px; font-size:16px; }
        button:hover{ background:#b51414; }
        .resumen-item{ padding:8px 0; border-bottom:1px solid #333; }
    </style>
</head>
<body>
<div class="contenedor">
    <h2>Resumen de Compra</h2>
    <div class="resumen-item" id="pelicula"></div>
    <div class="resumen-item" id="horario"></div>
    <div class="resumen-item" id="asientos"></div>
    <div class="resumen-item" id="total"></div>
    <hr>
    <input type="text" id="nombre" placeholder="Nombre completo" required>
    <input type="email" id="correo" placeholder="Correo" required>
    <input type="text" id="telefono" placeholder="Teléfono">
    <button id="comprar">Confirmar Compra</button>
</div>

<script>
    var reserva = JSON.parse(localStorage.getItem("reserva"));
    console.log("Reserva en Compra.html:", reserva);

    if (!reserva) {
        alert("No hay reserva activa");
        window.location.href = "Index.html";
    }

    // Cargar película
    fetch("/api/peliculas/" + reserva.idPelicula)
        .then(r => r.json())
        .then(p => {
            document.getElementById("pelicula").textContent = "Película: " + p.titulo;
        })
        .catch(e => console.error(e));

    // Mostrar datos
    document.getElementById("horario").textContent = "Horario: " + (reserva.hora || "No especificado");
    var nombresAsientos = reserva.asientos.map(function(a) { return a.nombre; }).join(", ");
    document.getElementById("asientos").textContent = "Asientos: " + nombresAsientos;
    document.getElementById("total").textContent = "Total: " + reserva.total + " Bs";

    // Comprar
    document.getElementById("comprar").onclick = function() {
        var nombre = document.getElementById("nombre").value.trim();
        var correo = document.getElementById("correo").value.trim();
        var telefono = document.getElementById("telefono").value.trim();

        if (!nombre || !correo) {
            alert("Complete todos los campos obligatorios");
            return;
        }

        var asientosEnviar = reserva.asientos.map(function(a) {
            return { fila: a.fila, columna: a.columna };
        });

        fetch("/api/reservar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                idFuncion: reserva.idFuncion,
                nombre: nombre,
                correo: correo,
                telefono: telefono,
                asientos: asientosEnviar
            })
        })
        .then(function(r) {
            console.log("Respuesta de /api/reservar:", r);
            if (!r.ok) throw new Error("Error en la reserva");
            return r.json();
        })
        .then(function(resultado) {
            console.log("Resultado:", resultado);
            if (resultado.correcto) {
                localStorage.removeItem("reserva");
                window.location.href = "Confirmacion.html";
            } else {
                alert("No se pudo completar la reserva: " + (resultado.mensaje || ""));
            }
        })
        .catch(function(error) {
            console.error("Error:", error);
            alert("Error al procesar la compra. Revisa la consola.");
        });
    };
</script>
</body>
</html>
