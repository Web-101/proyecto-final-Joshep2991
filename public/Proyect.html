<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cartelera</title>
    <link rel="stylesheet" href="Proyect.css">
</head>
<body>
    <header class="cabecera">
        <h1>Cartelera</h1>
        <p class="subtitulo">Selecciona un formato:</p>
        <div class="caja-filtro">
            <span>Todos los formatos</span>
        </div>
    </header>

    <main class="grid-peliculas" id="gridPeliculas"></main>

    <nav class="nav-inferior">
        <a href="#">Menu</a>
        <a href="#" class="activo">Ticket</a>
        <a href="#">Perfil</a>
        <a href="#">Mensaje</a>
    </nav>

    <script>
        fetch('/api/peliculas')
            .then(function(res) { return res.json(); })
            .then(function(pelis) {
                var grid = document.getElementById('gridPeliculas');
                grid.innerHTML = '';
                pelis.forEach(function(p) {
                    var a = document.createElement('a');
                    a.href = 'Detalle.html?id=' + p.id;
                    a.className = 'card';
                    a.style.textDecoration = 'none';
                    a.style.color = 'inherit';

                    if (p.estreno) {
                        var span = document.createElement('span');
                        span.className = 'etiqueta';
                        span.textContent = 'ESTRENO';
                        a.appendChild(span);
                    }

                    var img = document.createElement('img');
                    img.src = p.imagen;
                    img.alt = p.titulo;
                    a.appendChild(img);

                    var h3 = document.createElement('h3');
                    h3.textContent = p.titulo;
                    a.appendChild(h3);

                    grid.appendChild(a);
                });
            })
            .catch(function(e) { console.error('Error:', e); });
    </script>
</body>
</html>
