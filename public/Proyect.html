<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartelera</title>
<link rel="stylesheet" href="Proyect.css">
</head>
<body>
<header class="cabecera">
<h1>Cartelera</h1>
</header>
<main>
<div id="contenedorPeliculas" class="grid-peliculas"></div>
</main>
<script>
fetch('/api/peliculas')
.then(function(res) { return res.json(); })
.then(function(datos) {
    var caja = document.getElementById('contenedorPeliculas');
    datos.forEach(function(peli) {
        var div = document.createElement('div');
        div.className = 'tarjeta';
        div.onclick = function() {
            window.location.href = 'Funciones.html?id=' + peli.id;
        };
        var img = document.createElement('img');
        img.src = peli.imagen;
        var tit = document.createElement('h3');
        tit.textContent = peli.titulo;
        div.appendChild(img);
        div.appendChild(tit);
        caja.appendChild(div);
    });
});
</script>
</body>
</html>
