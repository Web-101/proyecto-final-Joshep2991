<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Detalle Pelicula</title>
    <link rel="stylesheet" href="Detalle.css">
</head>
<body>

    <header class="cabecera-detalle">
        <a href="Proyect.html" class="boton-volver">Volver</a>
        <h2>Detalle</h2>
    </header>

    <main class="contenedor-info">
        <img id="imgPelicula" src="" alt="" class="imagen-principal">
        <div class="textos-pelicula">
            <h1 id="tituloPelicula"></h1>
            <p id="generoPelicula" class="genero"></p>
            <h3>Sinopsis</h3>
            <p id="sinopsisPelicula" class="sinopsis"></p>
        </div>
        <a id="btnAsientos" href="#" class="boton-comprar">Seleccionar Asientos</a>
    </main>

    <script src="datos.js"></script>
    <script>
        // Leer el id de la URL
        var params = new URLSearchParams(window.location.search);
        var id = parseInt(params.get('id'));
        var pelicula = peliculas[id];

        if (pelicula) {
            document.getElementById('imgPelicula').src = pelicula.imagen;
            document.getElementById('imgPelicula').alt = pelicula.titulo;
            document.getElementById('tituloPelicula').textContent = pelicula.titulo;
            document.getElementById('generoPelicula').textContent = pelicula.genero + ' | ' + pelicula.duracion;
            document.getElementById('sinopsisPelicula').textContent = pelicula.sinopsis;
            document.getElementById('btnAsientos').href = 'Asientos.html?id=' + id;
        } else {
            // Si no existe, redirigir a la cartelera
            window.location.href = 'Proyect.html';
        }
    </script>
</body>
</html>
